<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Отзывы L7</title>
<style>
body{
  font-family:Arial;
  text-align:center;
  padding:40px;
  background:#f4f4f4;
}

button{
  padding:14px 22px;
  margin:8px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#2e7d32;
  color:white;
  cursor:pointer;
}

textarea{
  width:90%;
  height:140px;
  margin-top:15px;
  font-size:16px;
}

#qr{
  margin-top:30px;
}

img{
  width:250px;
  margin-top:15px;
}
</style>
</head>
<body>

<h2>Оставьте отзыв о центре L7 ❤️</h2>
<p>Нажмите кнопку чтобы сгенерировать текст</p>

<button onclick="generate()">Сгенерировать текст</button>
<br>
<textarea id="review"></textarea>
<br>
<button onclick="copyText()">Скопировать текст</button>

<h3>Выберите площадку</h3>
<button onclick="showGoogle()">Google</button>
<button onclick="show2gis()">2GIS</button>
<button onclick="showDoctors()">ПроДокторов</button>

<div id="qr"></div>

<script>
// Список шаблонов отзывов
const reviews = [
  "Очень внимательный врач, всё подробно объяснил. В клинике чисто и приятная атмосфера.",
  "Спасибо врачу за профессионализм и внимательное отношение.",
  "Отличная клиника и вежливый персонал. Прием прошел комфортно.",
  "Врач подробно ответил на все вопросы и дал рекомендации.",
  "Очень хорошее отношение к пациентам. Осталась довольна приемом."
];

// Генерация текста
function generate(){
  let r = reviews[Math.floor(Math.random()*reviews.length)];
  document.getElementById("review").value = r;
}

// Копирование текста
function copyText(){
  let text = document.getElementById("review");
  text.select();
  document.execCommand("copy");
  alert("Текст скопирован");
}

// QR-коды филиалов Google
function showGoogle(){
  document.getElementById("qr").innerHTML = `
    <h3>Выберите филиал</h3>
    <p>Абубакарова</p>
    <img src="google-abubakarova.png" alt="QR Google Абубакарова">
    <p>Батырая</p>
    <img src="google-batyraya.png" alt="QR Google Батырая">
  `;
}

// QR-коды филиалов 2GIS
function show2gis(){
  document.getElementById("qr").innerHTML = `
    <h3>Выберите филиал</h3>
    <p>Абубакарова</p>
    <img src="gis-abubakarova.png" alt="QR 2GIS Абубакарова">
    <p>Батырая</p>
    <img src="gis-batyraya.png" alt="QR 2GIS Батырая">
  `;
}

// QR-коды врачей ПроДокторов
function showDoctors(){
  document.getElementById("qr").innerHTML = `
    <h3>Выберите врача</h3>
    <p>Тамаева Фатима Арслановна</p>
    <img src="tamaeva.png" alt="QR Тамаева">
    <p>Нуриева Анастасия Мирединовна</p>
    <img src="nurieva.png" alt="QR Нуриева">
    <!-- Добавляйте сюда новые QR-коды врачей -->
    <!-- <p>Имя Фамилия</p><img src="файл.png" alt="QR Имя"> -->
  `;
}
</script>

</body>
</html>
