let current=null;
let currentPlatform=null;

function generate(){ review.value=reviews[Math.floor(Math.random()*reviews.length)]; }
function copyReview(){ navigator.clipboard.writeText(review.value); toast("Скопировано"); }

function selectPlatform(p,el){
  currentPlatform=p;
  document.querySelectorAll('.platforms button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  select.innerHTML='';
  const placeholder = (p==='prodoctor')?'Выберите врача...':'Выберите филиал...';
  const o0=document.createElement('option'); o0.value=''; o0.textContent=placeholder; select.appendChild(o0);
  data[p].forEach((item,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=item.name; select.appendChild(o); });
  qrBlock.classList.remove('show');
}

select.onchange=()=>{
  const item=data[currentPlatform][select.value]; if(!item) return;
  current=item; name.textContent=item.name; qr.src=item.qr; link.textContent=item.url; qrBlock.classList.add('show');
};

function openLink(){ if(current) window.open(current.url,'_blank'); }
function copyLink(){ if(current) navigator.clipboard.writeText(current.url); toast("Ссылка скопирована"); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
</script>
