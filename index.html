<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>L7 Отзывы</title>

<style>
:root{
  --bg:#f2f2f7;
  --card:rgba(255,255,255,0.7);
  --blur:blur(20px);
  --text:#111;
  --muted:#6e6e73;
  --accent:#007aff;
}
body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);}
.wrap{max-width:500px;margin:20px auto;padding:16px;}
.card{background:var(--card);backdrop-filter:var(--blur);border-radius:18px;padding:14px;margin-bottom:12px;}
button{border:none;border-radius:12px;padding:10px;background:var(--accent);color:#fff;}
button.secondary{background:#e5e5ea;color:#000;}
.platforms{display:flex;gap:8px;margin-bottom:10px;}
.platforms button.active{background:#34c759;}
textarea,select{width:100%;padding:12px;border-radius:12px;border:none;margin-top:10px;}
.qr{text-align:center;margin-top:10px;}
.qr img{max-width:160px;border-radius:12px;}
.small{font-size:12px;color:var(--muted);word-break:break-all;}
.actions{display:flex;gap:8px;margin-top:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px;border-radius:10px;display:none;}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
  <button onclick="generate()">Сгенерировать</button>
  <button class="secondary" onclick="copyReview()">Скопировать</button>
  <textarea id="review"></textarea>
</div>

<div class="card">

<div class="platforms">
  <button onclick="selectPlatform('google', this)">Google</button>
  <button onclick="selectPlatform('2gis', this)">2GIS</button>
  <button onclick="selectPlatform('prodoctor', this)">ПроДокторов</button>
</div>

<select id="select"></select>

<div class="qr" id="qrBlock" style="display:none">
  <div id="name"></div>
  <img id="qr">
  <div class="small" id="link"></div>

  <div class="actions">
    <button onclick="openLink()">Открыть</button>
    <button class="secondary" onclick="copyLink()">Копировать</button>
  </div>
</div>

</div>
</div>

<div id="toast"></div>

<script>
const data = {

google: [
  {
    name:"Абубакарова",
    url:"https://www.google.com/maps/place/Маммологический+центр+%22L7%22,+ул.+Абубакарова,+74,+Махачкала,+Респ.+Дагестан,+367000/",
    qr:"google-abubakarova.png"
  },
  {
    name:"Батырая",
    url:"https://www.google.com/maps/place/Маммологический+центр+L7,+ул.+Батырая,+88,+Махачкала,+Респ.+Дагестан,+367008/",
    qr:"google-batyraya.png"
  }
],

"2gis": [
  {
    name:"Абубакарова",
    url:"https://2gis.ru/makhachkala/firm/70000001036966726/tab/reviews",
    qr:"gis-abubakarova.png"
  },
  {
    name:"Батырая",
    url:"https://2gis.ru/makhachkala/firm/70000001063451186/tab/reviews",
    qr:"gis-batyraya.png"
  }
],

prodoctor: [
  { name:"Абдуллаева", url:"https://prodoctorov.ru/mahachkala/vrach/937672-abdullaeva/", qr:"abdullaeva.png" },
  { name:"Азаматова", url:"https://prodoctorov.ru/mahachkala/vrach/955460-azamatova/", qr:"azamatova.png" },
  { name:"Алиметова", url:"https://prodoctorov.ru/mahachkala/vrach/138973-alimetova/", qr:"alimetova.png" },
  { name:"Ахмедова", url:"https://prodoctorov.ru/mahachkala/vrach/347307-ahmedova/", qr:"ahmedova.png" },
  { name:"Бабаева", url:"https://prodoctorov.ru/mahachkala/vrach/1129493-babaeva/", qr:"babaeva.png" },

  { name:"Далгатова Патимат", url:"https://prodoctorov.ru/mahachkala/vrach/455427-dalgatova/", qr:"dalgatova-p.png" },
  { name:"Далгатова Солтанат", url:"https://prodoctorov.ru/mahachkala/vrach/908802-dalgatova/", qr:"dalgatova-s.png" },

  { name:"Магомедова Диана", url:"https://prodoctorov.ru/mahachkala/vrach/981164-magomedova/", qr:"magomedova-d.png" },
  { name:"Магомедова Мадина", url:"https://prodoctorov.ru/mahachkala/vrach/497767-magomedova/", qr:"magomedova-m.png" },

  { name:"Омарова Диана", url:"https://prodoctorov.ru/mahachkala/vrach/455425-omarova/", qr:"omarova-d.png" },
  { name:"Омарова Наиля", url:"https://prodoctorov.ru/mahachkala/vrach/606299-omarova/", qr:"omarova-n.png" }
]
};

const reviews = [
  "Очень внимательный врач, всё объяснил.",
  "Спасибо за профессионализм.",
  "Прием прошел комфортно."
];

let current = null;
let currentPlatform = null;

function generate(){
  review.value = reviews[Math.floor(Math.random()*reviews.length)];
}

function copyReview(){
  navigator.clipboard.writeText(review.value);
  toast("Скопировано");
}

function selectPlatform(p, el){
  currentPlatform = p;

  document.querySelectorAll('.platforms button')
    .forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  select.innerHTML = '<option value="">Выберите...</option>';

  data[p].forEach((item,i)=>{
    const o=document.createElement('option');
    o.value=i;
    o.textContent=item.name;
    select.appendChild(o);
  });

  qrBlock.style.display='none';
}

select.onchange = ()=>{
  const item = data[currentPlatform][select.value];
  if(!item) return;

  current = item;

  name.textContent = item.name;
  qr.src = item.qr;
  link.textContent = item.url;

  qrBlock.style.display='block';
};

function openLink(){
  window.open(current.url,'_blank','noopener,noreferrer');
}

function copyLink(){
  navigator.clipboard.writeText(current.url);
  toast("Ссылка скопирована");
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}
</script>

</body>
</html>
