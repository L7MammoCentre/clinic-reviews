button{border:none;border-radius:12px;padding:10px;background:#007aff;color:#fff;}
button.secondary{background:#e5e5ea;color:#000;}
.platforms{display:flex;gap:8px;margin-bottom:10px;}
.platforms button.active{background:#34c759;}
textarea,select{width:100%;padding:12px;border-radius:12px;border:none;margin-top:10px;}
.qr{text-align:center;margin-top:10px;}
.qr img{max-width:160px;border-radius:12px;}
.small{font-size:12px;color:#6e6e73;word-break:break-all;}
.actions{display:flex;gap:8px;margin-top:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px;border-radius:10px;display:none;}

</div>

<div class="card">
<div class="platforms">
  <button onclick="selectPlatform('google',this)">Google</button>
  <button onclick="selectPlatform('2gis',this)">2GIS</button>
  <button onclick="selectPlatform('prodoctor',this)">ПроДокторов</button>
</div>

<select id="select"></select>

<div class="qr" id="qrBlock" style="display:none">
  <div id="name"></div>
  <img id="qr">
  <div class="small" id="link"></div>

  <div class="actions">
    <button onclick="openLink()">Открыть</button>
    <button class="secondary" onclick="copyLink()">Копировать</button>

const phrases4 = ["в клинике приятная атмосфера","коллектив очень доброжелательный","персонал вежливый","чувствуется поддержка"];
const phrases5 = ["все прошло с улыбкой","остались только положительные эмоции","обязательно вернусь","рекомендую клинику"];

for(let i=0;i<600;i++){
  reviews.push(
    `${phrases1[i%4]}. ${phrases2[i%4]}, ${phrases3[i%4]}. ${phrases4[i%4]}. ${phrases5[i%4]}.`
  );

// ----------- ЛОГИКА -----------

let current=null;
let currentPlatform=null;

function generate(){
  review.value = reviews[Math.floor(Math.random()*reviews.length)];
}

function copyReview(){
  navigator.clipboard.writeText(review.value);
  toast("Скопировано");
}

function selectPlatform(p,el){
  currentPlatform=p;

  document.querySelectorAll('.platforms button')
  .forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  select.innerHTML='<option value="">Выберите...</option>';

  data[p].forEach((item,i)=>{
    const o=document.createElement('option');
    o.value=i;
    o.textContent=item.name;
    select.appendChild(o);
  });

  qrBlock.style.display='none';
}

select.onchange=()=>{
  const item=data[currentPlatform][select.value];
  if(!item) return;

  current=item;

  name.textContent=item.name;
  qr.src=item.qr;
  link.textContent=item.url;

  qrBlock.style.display='block';
};

function openLink(){
  window.open(current.url,'_blank');
}

function copyLink(){
  navigator.clipboard.writeText(current.url);
  toast("Ссылка скопирована");
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

</script>
