<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>L7 Отзывы</title>

<style>
:root{
  --bg:#f2f2f7;
  --card:rgba(255,255,255,0.7);
  --blur:blur(20px);
  --text:#111;
  --muted:#6e6e73;
  --accent:#007aff;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:500px;
  margin:20px auto;
  padding:16px;
}

h1{
  font-size:20px;
  margin:0 0 6px;
}

.lead{
  color:var(--muted);
  font-size:14px;
  margin-bottom:16px;
}

.card{
  background:var(--card);
  backdrop-filter:var(--blur);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

button{
  border:none;
  border-radius:12px;
  padding:10px;
  font-size:14px;
  background:var(--accent);
  color:white;
}

button.secondary{
  background:#e5e5ea;
  color:#000;
}

textarea{
  width:100%;
  border-radius:12px;
  border:none;
  padding:12px;
  font-size:15px;
  margin-top:10px;
  resize:vertical;
}

select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:15px;
  background:#fff;
}

.qr{
  margin-top:12px;
  text-align:center;
}

.qr img{
  max-width:160px;
  border-radius:12px;
  margin-top:10px;
}

.small{
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
}

.actions{
  display:flex;
  gap:8px;
  margin-top:10px;
}

#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Оставьте отзыв ❤️</h1>
<p class="lead">Сгенерируйте текст и выберите врача</p>

<div class="card">
  <button onclick="generate()">Сгенерировать</button>
  <button class="secondary" onclick="copyReview()">Скопировать</button>
  <textarea id="review"></textarea>
</div>

<div class="card">
  <select id="doctor"></select>

  <div class="qr" id="qrBlock" style="display:none">
    <div id="name"></div>
    <img id="qr">
    <div class="small" id="link"></div>

    <div class="actions">
      <button onclick="openLink()">Открыть</button>
      <button class="secondary" onclick="copyLink()">Копировать</button>
    </div>
  </div>
</div>

</div>

<div id="toast"></div>

<script>
const doctors = [
  { name:"Магомедова Диана", url:"https://prodoctorov.ru/mahachkala/vrach/981164-magomedova/", qr:"magomedova-d.png" },
  { name:"Магомедова Мадина", url:"https://prodoctorov.ru/mahachkala/vrach/497767-magomedova/", qr:"magomedova-m.png" },
  { name:"Омарова Диана", url:"https://prodoctorov.ru/mahachkala/vrach/455425-omarova/", qr:"omarova-d.png" },
  { name:"Абдуллаева", url:"https://prodoctorov.ru/mahachkala/vrach/937672-abdullaeva/", qr:"abdullaeva.png" }
];

const reviews = [
  "Очень понравился прием, врач внимательный.",
  "Спасибо за профессионализм.",
  "Отличная клиника и персонал."
];

let current = null;

function generate(){
  review.value = reviews[Math.floor(Math.random()*reviews.length)];
}

function copyReview(){
  navigator.clipboard.writeText(review.value);
  toast("Скопировано");
}

function init(){
  doctors.forEach((d,i)=>{
    const o=document.createElement('option');
    o.value=i;
    o.textContent=d.name;
    doctor.appendChild(o);
  });

  doctor.onchange = ()=>{
    const d = doctors[doctor.value];
    current = d;

    name.textContent = d.name;
    qr.src = d.qr;
    link.textContent = d.url;

    qrBlock.style.display = 'block';
  };
}

function openLink(){
  window.open(current.url,'_blank','noopener,noreferrer');
}

function copyLink(){
  navigator.clipboard.writeText(current.url);
  toast("Ссылка скопирована");
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

init();
</script>

</body>
</html>
