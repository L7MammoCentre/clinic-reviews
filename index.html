<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>L7 Отзывы</title>
<style>
:root{
  --bg:#f2f2f7;
  --card:rgba(255,255,255,0.7);
  --blur:blur(20px);
  --text:#111;
  --muted:#6e6e73;
  --accent:#007aff;
}
body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);}
.wrap{max-width:500px;margin:20px auto;padding:16px;}
.card{background:var(--card);backdrop-filter:var(--blur);border-radius:18px;padding:14px;margin-bottom:12px;}
button{border:none;border-radius:12px;padding:10px;background:var(--accent);color:#fff;}
button.secondary{background:#e5e5ea;color:#000;}
.platforms{display:flex;gap:8px;margin-bottom:10px;}
.platforms button.active{background:#34c759;}
textarea{width:100%;padding:12px;border-radius:12px;border:none;margin-top:10px;}
select{width:100%;padding:12px;border-radius:12px;border:none;margin-top:10px;max-height:300px;overflow-y:auto;}
.qr{text-align:center;margin-top:10px;}
.qr img{max-width:160px;border-radius:12px;}
.small{font-size:12px;color:var(--muted);word-break:break-all;}
.actions{display:flex;gap:8px;margin-top:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px;border-radius:10px;display:none;}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
  <button onclick="generate()">Сгенерировать</button>
  <button class="secondary" onclick="copyReview()">Скопировать</button>
  <textarea id="review"></textarea>
</div>

<div class="card">
<div class="platforms">
  <button onclick="selectPlatform('google', this)">Google</button>
  <button onclick="selectPlatform('2gis', this)">2GIS</button>
  <button onclick="selectPlatform('prodoctor', this)">ПроДокторов</button>
</div>

<select id="select"></select>

<div class="qr" id="qrBlock" style="display:none">
  <div id="name"></div>
  <img id="qr" alt="QR">
  <div class="small" id="link"></div>
  <div class="actions">
    <button onclick="openLink()">Открыть</button>
    <button class="secondary" onclick="copyLink()">Копировать</button>
  </div>
</div>

</div>
</div>

<div id="toast"></div>

  {name:"Шейхмагомедова Заира Адамовна", url:"https://prodoctorov.ru/mahachкала/vrach/455426-shyayhmagomedova/"}
]
};

const reviews = ["Очень внимательный врач, всё объяснил.","Спасибо за профессионализм.","Прием прошел комфортно."];

let current = null;
let currentPlatform = null;

function generate(){ document.getElementById('review').value = reviews[Math.floor(Math.random()*reviews.length)]; }
function copyReview(){ navigator.clipboard.writeText(document.getElementById('review').value); toast("Скопировано"); }

function selectPlatform(platform, el){
  currentPlatform = platform;
  document.querySelectorAll('.platforms button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  const select = document.getElementById('select');
  select.innerHTML='';
  data[platform].forEach(item=>{
    const o = document.createElement('option');
    o.value = item.name; // используем ФИО как уникальный идентификатор
    o.textContent = item.name;
    select.appendChild(o);
  });

  document.getElementById('qrBlock').style.display='none';
}

document.getElementById('select').addEventListener('change', function(){
  const name = this.value;
  if(!name) return;
  current = data[currentPlatform].find(d => d.name===name);
  if(!current) return;
  document.getElementById('name').textContent = current.name;
  document.getElementById('link').textContent = current.url;
  // QR генерируем через Google Chart API
  document.getElementById('qr').src = "https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl="+encodeURIComponent(current.url);
  document.getElementById('qrBlock').style.display='block';
});

function openLink(){ if(current) window.open(current.url,'_blank'); }
function copyLink(){ if(current){ navigator.clipboard.writeText(current.url); toast("Ссылка скопирована"); } }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}
</script>
</body>
</html>
