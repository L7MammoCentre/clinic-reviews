<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Оставить отзыв</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:40px;
  background:#f5f5f5;
}
button{
  padding:15px 25px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}
textarea{
  width:90%;
  height:120px;
  margin-top:20px;
  font-size:16px;
  resize:none;
}
</style>

</head>

<body>

<h2>Спасибо за визит ❤️</h2>
<p>Нам будет очень приятно, если вы оставите отзыв</p>

<button id="genBtn">Сгенерировать текст</button>

<br>
<textarea id="reviewText" placeholder="Ваш отзыв появится здесь..."></textarea>
<br>
<button id="copyBtn">Скопировать текст</button>

<h3>Оставить отзыв:</h3>
<button id="googleBtn">Google</button>
<button id="gisBtn">2GIS</button>

<script>
// Массив примеров отзывов
const reviews = [
  "Очень внимательный врач, подробно объяснил лечение. В клинике чисто и приятная атмосфера. Спасибо за профессионализм.",
  "Был на приеме в этой клинике. Всё прошло комфортно, врач подробно ответил на все вопросы. Рекомендую.",
  "Отличная клиника и очень вежливый персонал. Прием прошел спокойно, врач всё объяснил и дал рекомендации.",
  "Хорошее обслуживание, внимательный врач и приятная атмосфера. Остался доволен приемом.",
  "Спасибо врачу за внимательное отношение и профессиональный подход. Всё прошло отлично."
];

// Генерация текста
document.getElementById("genBtn").onclick = function(){
  const random = reviews[Math.floor(Math.random()*reviews.length)];
  document.getElementById("reviewText").value = random;
};

// Копирование текста
document.getElementById("copyBtn").onclick = function(){
  const textArea = document.getElementById("reviewText");
  textArea.select();
  textArea.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("Текст скопирован!");
};

// Ссылки на отзывы
const googleLink = "https://www.google.com/maps/place/Маммологический+центр+%22L7%22,+ул.+Абубакарова,+74,+Махачкала,+Респ.+Дагестан,+367000/@42.9727081,47.4946757,17z/data=!4m6!3m5!1s0x404ea02e68c1fa6b:0xa34833769d433377!8m2!3d42.9727081!4d47.4946757!16s%2Fg%2F11c55ts7gv?g_ep=Eg1tbF8yMDI2MDMwMl8wIJvbDyoASAJQAg%3D%3D";
const gisLink = "https://2gis.ru/makhachkala/firm/70000001036966726/tab/reviews/addreview?m=47.494734%2C42.972773%2F16";

// Кнопки открытия ссылок
document.getElementById("googleBtn").onclick = function(){
  window.open(googleLink, "_blank");
};
document.getElementById("gisBtn").onclick = function(){
  window.open(gisLink, "_blank");
};
</script>

</body>
</html>
