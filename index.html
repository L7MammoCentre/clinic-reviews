<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>L7 Отзывы</title>
<style>
:root{
  --bg:#f0f2f5;
  --card:#fff;
  --text:#111;
  --muted:#6e6e73;
  --accent:#007aff;
  --accent-grad:linear-gradient(90deg,#007aff,#34c759);
}
body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);}
.wrap{max-width:500px;margin:20px auto;padding:16px;}
.card{background:var(--card);border-radius:18px;padding:14px;margin-bottom:16px;box-shadow:0 8px 16px rgba(0,0,0,0.1);transition:all 0.3s;}
.card:hover{transform:translateY(-2px);}
button{border:none;border-radius:12px;padding:10px 16px;color:#fff;cursor:pointer;transition:0.2s;}
button#generateBtn{background:var(--accent-grad);}
button:hover{opacity:0.9;}
button.secondary{background:#e5e5ea;color:#000;}
.platforms{display:flex;gap:8px;margin-bottom:12px;}
.platforms button.active{background:#34c759;color:#fff;}
textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;margin-top:10px;resize:none;}
select{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;margin-top:10px;max-height:300px;overflow-y:auto;}
.qr{text-align:center;margin-top:12px;transition:0.3s;position:relative;}
.qr img{max-width:160px;border-radius:12px;transition:0.3s;}
.small{font-size:12px;color:var(--muted);word-break:break-all;}
.actions{display:flex;gap:8px;margin-top:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px;border-radius:10px;display:none;opacity:0;transition:0.3s;}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
  <button id="generateBtn">Сгенерировать</button>
  <button class="secondary" id="copyReviewBtn">Скопировать</button>
  <textarea id="review" rows="4" readonly></textarea>
</div>

<div class="card">
<div class="platforms">
  <button data-platform="google">Google</button>
  <button data-platform="2gis">2GIS</button>
  <button data-platform="prodoctor">ПроДокторов</button>
</div>

<select id="select"></select>

<div class="qr" id="qrBlock" style="display:none">
  <div id="name"></div>
  <img id="qr" alt="QR" title="Наведите для ссылки на отзыв">
  <div class="small" id="link"></div>
  <div class="actions">
    <button id="openLinkBtn">Открыть</button>
    <button class="secondary" id="copyLinkBtn">Копировать</button>
  </div>
</div>
</div>
</div>

<div id="toast"></div>

<script>
window.addEventListener('DOMContentLoaded', () => {

// ===================== Массив отзывов (пример 500+ отзывов) =====================
const reviews = [
"Прием прошел на высшем уровне. Врач был невероятно внимательный, подробно объяснил все процедуры и варианты лечения. Я чувствовала поддержку на каждом этапе и понимала, что нахожусь в надежных руках. Персонал клиники приветливый и доброжелательный, встречают с улыбкой и всегда готовы помочь. Атмосфера была теплой и спокойной, что очень важно для пациентов. Грамотный специалист и отличный коллектив сделали визит комфортным. Я обязательно буду рекомендовать эту клинику друзьям и знакомым.",
"Очень дружелюбный и внимательный врач. На приеме мне подробно объяснили каждый шаг лечения и ответили на все вопросы. Персонал клиники поддерживал на протяжении всего визита и встречал с улыбкой. Атмосфера была спокойной и доброжелательной, что создавало ощущение заботы. Врач проявил эмпатию и профессионализм, все объяснил доступно и терпеливо. Я чувствовала, что мой случай воспринимают серьезно. Отличная команда и клиника, куда хочется возвращаться.",
"Хочу поблагодарить врача за внимательный и профессиональный подход. Прием прошел очень комфортно, все было подробно объяснено, без спешки. Врач с улыбкой отвечал на вопросы и проявил настоящую эмпатию. Коллектив клиники создал атмосферу поддержки и доверия, я чувствовала себя уверенно и спокойно. Это редкость встретить грамотного специалиста, который не только лечит, но и заботится о пациенте. Персонал вежливый и отзывчивый, всегда готовы помочь. Визит оставил только положительные впечатления, рекомендую всем.",
// … здесь добавьте остальные отзывы, чтобы получилось 500–1000 уникальных
];

// ===================== Данные врачей =====================
const data = {
  google: [
    {name:"Абубакарова", url:"https://www.google.com/maps/place/Маммологический+центр+%22L7%22,+ул.+Абубакарова,+74,+Махачкала,+Респ.+Дагестан,+367000"},
    {name:"Батырая", url:"https://www.google.com/maps/place/Маммологический+центр+L7,+ул.+Батырая,+88,+Махачкала,+Респ.+Дагестан,+367008"}
  ],
  "2gis": [
    {name:"Абубакарова", url:"https://2gis.ru/makhachkala/firm/70000001036966726/tab/reviews"},
    {name:"Батырая", url:"https://2gis.ru/makhachkala/firm/70000001063451186/tab/reviews"}
  ],
  prodoctor: [
    {name:"Абдуллаева Камилла Омаровна", url:"https://prodoctorov.ru/mahachkала/vrach/937672-abdullaeva/"},
    {name:"Азаматова Заида Арсланбековна", url:"https://prodoctorov.ru/mahachкала/vrach/955460-azamatova/"},
    {name:"Алиметова Карина Альбертовна", url:"https://prodoctorov.ru/mahachкала/vrach/138973-alimetova/"},
    {name:"Ахмедова Заира Магомедовна", url:"https://prodoctorov.ru/mahachкала/vrach/347307-ahmedova/"},
    {name:"Бабаева Аминат Магомедовна", url:"https://prodoctorov.ru/mahachкала/vrach/1129493-babaeva/"},
    {name:"Гаджиева Мадина Халилбеговна", url:"https://prodoctorov.ru/mahachкала/vrach/536367-gadzhieva/"},
    {name:"Гамзатова Зайнаб Хизриевна", url:"https://prodoctorov.ru/mahachкала/vrach/1271257-gamzatova/"},
    {name:"Гусейнаева Севиля Абакаровна", url:"https://prodoctorov.ru/mahachкала/vrach/1332886-gusyaynaeva/"},
    {name:"Даитгаджиева Аминат Магомедовна", url:"https://prodoctorov.ru/mahachкала/vrach/539425-daitgadzhieva/"},
    {name:"Далгатова Патимат Омардибировна", url:"https://prodoctorov.ru/mahachкала/vrach/455427-dalgatova/"},
    {name:"Далгатова Солтанат Ибрагимовна", url:"https://prodoctorov.ru/mahachкала/vrach/908802-dalgatova/"},
    // … добавляем всех остальных до 39 врачей
  ]
};

// ===================== Функции =====================
let currentPlatform = null;
let currentDoctor = null;

const reviewEl = document.getElementById('review');
const selectEl = document.getElementById('select');
const qrBlock = document.getElementById('qrBlock');
const qrImg = document.getElementById('qr');
const nameEl = document.getElementById('name');
const linkEl = document.getElementById('link');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display='block';
  t.style.opacity='1';
  setTimeout(()=>{
    t.style.opacity='0';
    setTimeout(()=>t.style.display='none',300);
  },2000);
}

// ===================== Кнопки =====================
document.getElementById('generateBtn').addEventListener('click', ()=>{
  reviewEl.value = reviews[Math.floor(Math.random()*reviews.length)];
});

document.getElementById('copyReviewBtn').addEventListener('click', ()=>{
  navigator.clipboard.writeText(reviewEl.value);
  showToast("Скопировано");
});

document.querySelectorAll('.platforms button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentPlatform = btn.dataset.platform;
    document.querySelectorAll('.platforms button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const sorted = [...data[currentPlatform]].sort((a,b)=>a.name.localeCompare(b.name,'ru'));
    selectEl.innerHTML='';
    sorted.forEach((item,idx)=>{
      const opt=document.createElement('option');
      opt.value=idx;
      opt.textContent=item.name;
      selectEl.appendChild(opt);
    });
    qrBlock.style.display='none';
    reviewEl.value='';
  });
});

selectEl.addEventListener('change', ()=>{
  const idx = selectEl.value;
  if(idx==='') return;
  currentDoctor = data[currentPlatform].sort((a,b)=>a.name.localeCompare(b.name,'ru'))[idx];
  nameEl.textContent = currentDoctor.name;
  linkEl.textContent = currentDoctor.url;
  qrImg.src = "https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl="+encodeURIComponent(currentDoctor.url);
  qrBlock.style.display='block';
  reviewEl.value = reviews[Math.floor(Math.random()*reviews.length)];
});

document.getElementById('openLinkBtn').addEventListener('click', ()=>{
  if(currentDoctor) window.open(currentDoctor.url,'_blank');
});

document.getElementById('copyLinkBtn').addEventListener('click', ()=>{
  if(currentDoctor){
    navigator.clipboard.writeText(currentDoctor.url);
    showToast("Ссылка скопирована");
  }
});
});
</script>
</body>
</html>
