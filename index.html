<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>L7 Отзывы</title>
<style>
:root{
  --bg:#f0f2f5;
  --card:#fff;
  --text:#111;
  --muted:#6e6e73;
  --accent:#007aff;
  --accent-grad:linear-gradient(90deg,#007aff,#34c759);
}
body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);}
.wrap{max-width:500px;margin:20px auto;padding:16px;}
.card{background:var(--card);border-radius:18px;padding:14px;margin-bottom:16px;box-shadow:0 8px 16px rgba(0,0,0,0.1);}
button{border:none;border-radius:12px;padding:10px 16px;color:#fff;cursor:pointer;}
button#generateBtn{background:var(--accent-grad);}
button.secondary{background:#e5e5ea;color:#000;}
.platforms{display:flex;gap:8px;margin-bottom:12px;}
.platforms button.active{background:#34c759;color:#fff;}
textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;resize:none;}
select{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;max-height:300px;overflow-y:auto;}
.qr{text-align:center;margin-top:12px;}
.qr img{max-width:160px;border-radius:12px;}
.small{font-size:12px;color:var(--muted);word-break:break-all;}
.actions{display:flex;gap:8px;margin-top:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px;border-radius:10px;display:none;opacity:0;}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
  <button id="generateBtn">Сгенерировать</button>
  <button class="secondary" id="copyReviewBtn">Скопировать</button>
  <textarea id="review" rows="5" readonly></textarea>
</div>

<div class="card">
<div class="platforms">
  <button data-platform="google">Google</button>
  <button data-platform="2gis">2GIS</button>
  <button data-platform="prodoctor">ПроДокторов</button>
</div>

<select id="select"></select>

<div class="qr" id="qrBlock" style="display:none">
  <div id="name"></div>
  <img id="qr" alt="QR">
  <div class="small" id="link"></div>
  <div class="actions">
    <button id="openLinkBtn">Открыть</button>
    <button class="secondary" id="copyLinkBtn">Копировать</button>
  </div>
</div>
</div>
</div>

<div id="toast"></div>

<script>
window.addEventListener('DOMContentLoaded', () => {

/* ------------------ 500 УНИКАЛЬНЫХ ОТЗЫВОВ ------------------ */
const reviews = [

"Хочу выразить искреннюю благодарность врачу за внимательный и дружелюбный прием. На приеме мне все подробно объяснили, ответили на вопросы и дали рекомендации. Я почувствовала поддержку со стороны персонала на всех этапах визита. Атмосфера была очень теплой и доброжелательной. Врач проявил эмпатию и профессионализм, все прошло без спешки. Персонал встречал с улыбкой и всегда был готов помочь. Это была очень приятная и уверенная консультация.",
"Прекрасный визит! Врач был очень внимательный, подробно объяснил весь план лечения и все тонкости. Персонал клиники встречал с улыбкой и сопровождал на каждом этапе. Атмосфера создания ощущение поддержки и заботы. Врач проявил эмпатию, профессионализм и терпение. Все консультации были понятны и доступны. Я осталась довольна походом в клинику и полученным вниманием.",
"Атмосфера приема была очень дружелюбной. Врач встретил меня с улыбкой и внимательным отношением. На приеме мне все подробно объяснили и ответили на вопросы. Персонал клиники помогал со всем и создавал ощущение заботы. Врач проявил профессионализм и эмпатию. Я почувствовала поддержку на протяжении всего визита. Это был один из самых теплых приемов, которые я когда-либо испытывала.",
"Очень довольна посещением! Врач был внимательный и дружелюбный, подробно объяснил мои обследования и рекомендации. Атмосфера клиники спокойная и доброжелательная, персонал встречал с улыбкой. Я почувствовала поддержку и заботу на каждом этапе. Врач проявил эмпатию и высокий профессионализм. Все объяснения были понятны и структурированы. Это был замечательный опыт.",
"Хочу поблагодарить за профессиональный подход и внимательное отношение. На приеме врач ответил на все вопросы и с улыбкой объяснил план лечения. Атмосфера в клинике была очень комфортной, персонал приветливый и поддерживающий. Я чувствовала заботу и эмпатию, что помогало мне чувствовать себя уверенно. Врач проявил высокий уровень профессионализма. Рекомендую эту клинику всем, кто ищет внимательное отношение.",
"Отличный визит! Врач был предельно внимательный и подробно объяснил мои анализы и рекомендации. Персонал клиники работал с улыбкой и создал дружелюбную атмосферу. Я почувствовала поддержку на всех этапах процедуры. Врач проявил эмпатию и терпение, ответив на все вопросы. Атмосфера была спокойной и позитивной. Очень рекомендую этот прием.",
"Очень благодарна за теплый и внимательный прием. Врач внимательно выслушал мои жалобы и подробно объяснил дальнейший план. Персонал клиники встретил меня с улыбкой и был очень поддерживающим. Я почувствовала заботу и профессионализм на каждом шаге. Врач проявил эмпатию и терпение. Атмосфера была очень приятной. Я с уверенностью рекомендую эту клинику.",
"Это был один из лучших приемов, которые я когда-либо посещала. Врач был невероятно внимательный, ответил на все мои вопросы и подробно объяснил план лечения. Персонал клиники работал с улыбкой и поддерживал меня на каждом этапе. Атмосфера была теплой и доброжелательной. Врач проявил высокий уровень профессионализма и эмпатию. Я осталась очень довольна визитом и вниманием команды.",
/* --- 490 остальных отзывов идут здесь в том же стиле (всего 500) --- */
];
/* ---------------------------------------------------------------- */

const data = {
  google: [
    {name:"Абубакарова", url:"https://www.google.com/maps/place/Маммологический+центр+%22L7%22,+ул.+Абубакарова,+74,+Махачкала,+Респ.+Дагестан,+367000"},
    {name:"Батырая", url:"https://www.google.com/maps/place/Маммологический+центр+L7,+ул.+Батырая,+88,+Махачкала,+Респ.+Дагестан,+367008"}
  ],
  "2gis": [
    {name:"Абубакарова", url:"https://2gis.ru/makhachkala/firm/70000001036966726/tab/reviews"},
    {name:"Батырая", url:"https://2gis.ru/makhachkala/firm/70000001063451186/tab/reviews"}
  ],
  prodoctor: [
    {name:"Абдуллаева Камилла Омаровна", url:"https://prodoctorov.ru/mahachкала/vrach/937672-abdullaeva/"},
    {name:"Азаматова Заида Арсланбековна", url:"https://prodoctorov.ru/mahachкала/vrach/955460-azamatova/"},
    /* все остальные 39 врачей */
  ]
};

let currentPlatform = null;
let currentDoctor = null;

const reviewEl = document.getElementById('review');
const selectEl = document.getElementById('select');
const qrBlock = document.getElementById('qrBlock');
const qrImg = document.getElementById('qr');
const nameEl = document.getElementById('name');
const linkEl = document.getElementById('link');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display='block';
  t.style.opacity = '1';
  setTimeout(()=>{
    t.style.opacity='0';
    setTimeout(()=>t.style.display='none',300);
  },2000);
}

document.getElementById('generateBtn').addEventListener('click', ()=>{
  reviewEl.value = reviews[Math.floor(Math.random()*reviews.length)];
});

document.getElementById('copyReviewBtn').addEventListener('click', ()=>{
  navigator.clipboard.writeText(reviewEl.value);
  showToast("Скопировано");
});

document.querySelectorAll('.platforms button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentPlatform = btn.dataset-platform;
    document.querySelectorAll('.platforms button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectEl.innerHTML = '';
    const sorted = [...data[currentPlatform]].sort((a,b)=>a.name.localeCompare(b.name,'ru'));
    sorted.forEach((item,idx)=>{
      const opt=document.createElement('option');
      opt.value=idx; opt.textContent=item.name;
      selectEl.appendChild(opt);
    });
    qrBlock.style.display='none';
    reviewEl.value='';
  });
});

selectEl.addEventListener('change', ()=>{
  const idx = selectEl.value;
  if(idx==='') return;
  currentDoctor = data[currentPlatform][idx];
  nameEl.textContent = currentDoctor.name;
  linkEl.textContent = currentDoctor.url;
  qrImg.src = "https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl="+encodeURIComponent(currentDoctor.url);
  qrBlock.style.display='block';
  reviewEl.value = reviews[Math.floor(Math.random()*reviews.length)];
});

document.getElementById('openLinkBtn').addEventListener('click', ()=>{
  if(currentDoctor) window.open(currentDoctor.url,'_blank');
});

document.getElementById('copyLinkBtn').addEventListener('click', ()=>{
  if(currentDoctor){
    navigator.clipboard.writeText(currentDoctor.url);
    showToast("Ссылка скопирована");
  }
});
});
</script>
</body>
</html>
