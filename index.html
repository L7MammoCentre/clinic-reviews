<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>L7 Отзывы</title>
<style>
:root{
  --bg:#f0f2f5;
  --card:#fff;
  --text:#111;
  --muted:#6e6e73;
  --accent:#007aff;
  --accent-grad:linear-gradient(90deg,#007aff,#34c759);
}
body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);}
.wrap{max-width:500px;margin:20px auto;padding:16px;}
.card{background:var(--card);border-radius:18px;padding:14px;margin-bottom:16px;box-shadow:0 8px 16px rgba(0,0,0,0.1);}
button{border:none;border-radius:12px;padding:10px 16px;color:#fff;cursor:pointer;}
button#generateBtn{background:var(--accent-grad);}
button.secondary{background:#e5e5ea;color:#000;}
.platforms{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.platforms button.active{background:#34c759;color:#fff;}
textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;resize:none;white-space:pre-wrap;overflow-y:auto;}
select{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;max-height:300px;overflow-y:auto;}
.qr{text-align:center;margin-top:12px;}
.qr img{max-width:160px;border-radius:12px;}
.small{font-size:12px;color:var(--muted);word-break:break-all;}
.actions{display:flex;gap:8px;margin-top:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px;border-radius:10px;display:none;opacity:0;transition:opacity 0.3s;}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
  <button id="generateBtn">Сгенерировать</button>
  <button class="secondary" id="copyReviewBtn">Скопировать</button>
  <textarea id="review" rows="5" readonly></textarea>
</div>

<div class="card">
<div class="platforms">
  <button data-platform="google">Google</button>
  <button data-platform="2gis">2GIS</button>
  <button data-platform="prodoctor">ПроДокторов</button>
</div>

<select id="select"><option value="">Выберите врача...</option></select>

<div class="qr" id="qrBlock" style="display:none">
  <div id="name"></div>
  <img id="qr" alt="QR">
  <div class="small" id="link"></div>
  <div class="actions">
    <button id="openLinkBtn">Открыть</button>
    <button class="secondary" id="copyLinkBtn">Копировать</button>
  </div>
</div>
</div>
</div>

<div id="toast"></div>

<script>
window.addEventListener('DOMContentLoaded', () => {

"Прием прошел на высшем уровне. Врач был внимательный, подробно объяснил все этапы лечения, атмосфера была дружелюбной, коллектив поддерживал, все с улыбкой. Я осталась довольна визитом.",
"Очень благодарна за теплый прием. Врач профессиональный, с улыбкой объяснил план лечения, персонал поддерживал, атмосфера уютная. Рекомендую клинику друзьям.",
"Врач внимательный и профессиональный, все объяснил подробно. Атмосфера клиники дружелюбная, коллектив отзывчивый, чувствуется поддержка и забота. Прийду снова с улыбкой."
];

// ------------------ Данные всех 39 врачей с локальными PNG ------------------
const data = {

  prodoctor: [

    {name:"Гусейнаева Севиля Абакаровна", url:"https://prodoctorov.ru/mahachкала/vrach/1332886-gusyaynaeva/", qr:"qr/gusyaynaeva.png"},

    {name:"Омарова Диана Гаджимурадовна", url:"https://prodoctorov.ru/mahachкала/vrach/455425-omarova/", qr:"qr/omarova-d.png"},
    {name:"Омарова Наиля Омаровна", url:"https://prodoctorov.ru/mahachкала/vrach/606299-omarova/", qr:"qr/omarova-n.png"},
    {name:"Омарова Оксана Магомедовна", url:"https://prodoctorov.ru/mahachкала/vrach/539403-omarova/", qr:"qr/omarova-o.png"},
    {name:"Рамазанова Заира Джамутдиновна", url:"https://prodoctorov.ru/mahachкала/vrach/555316-ramazanova/", qr:"qr/ramazanova.png"},

    {name:"Тагирова Айша Гаджиевна", url:"https://prodoctorov.ru/mahachкала/vrach/455421-tagirova/", qr:"qr/tagirova.png"},
    {name:"Тамаева Фатима Арслановна", url:"https://prodoctorov.ru/mahachкала/vrach/455423-tamaeva/", qr:"qr/tamaeva.png"},
    {name:"Терещенко Каринэ Александровна", url:"https://prodoctorov.ru/mahachкала/vrach/539438-tereshenko/", qr:"qr/tereshenko.png"},
    {name:"Убайдуллаева Аида Абдулвагитовна", url:"https://prodoctorov.ru/mahachкала/vrach/1256140-ubaydullaeva/", qr:"qr/ubaydullaeva.png"},
    {name:"Шахсинова Раиса Наримановна", url:"https://prodoctorov.ru/mahachкала/vrach/1085216-shahsinova/", qr:"qr/shahsinova.png"},
    {name:"Шейхмагомедова Заира Адамовна", url:"https://prodoctorov.ru/mahachкала/vrach/455426-shyayhmagomedova/", qr:"qr/shyayhmagomedova.png"}
  ]
};

// ------------------ Логика работы ------------------
let currentPlatform = null;
let currentDoctor = null;

const reviewEl = document.getElementById('review');
const selectEl = document.getElementById('select');
const qrBlock = document.getElementById('qrBlock');
const qrImg = document.getElementById('qr');
const nameEl = document.getElementById('name');
const linkEl = document.getElementById('link');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display='block';
  t.style.opacity = '1';
  setTimeout(()=>{
    t.style.opacity='0';
    setTimeout(()=>t.style.display='none',300);
  },2000);
}

function generateReview(){
  reviewEl.value = reviews[Math.floor(Math.random()*reviews.length)];
  reviewEl.style.height = 'auto';
  reviewEl.style.height = reviewEl.scrollHeight + 'px';
}

document.getElementById('generateBtn').addEventListener('click', generateReview);
document.getElementById('copyReviewBtn').addEventListener('click', ()=>{
  navigator.clipboard.writeText(reviewEl.value);
  showToast("Скопировано");
});

document.querySelectorAll('.platforms button').forEach(btn=>{
  ['click','touchstart'].forEach(evt=>{
    btn.addEventListener(evt, ()=>{
      currentPlatform = btn.dataset.platform;
      document.querySelectorAll('.platforms button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectEl.innerHTML = '<option value="">Выберите врача...</option>';
      if(Array.isArray(data[currentPlatform])){
        data[currentPlatform].forEach((item,idx)=>{
          const opt = document.createElement('option');
          opt.value = idx;
          opt.textContent = item.name;
          selectEl.appendChild(opt);
        });
      }
      qrBlock.style.display='none';
      reviewEl.value='';
    });
  });
});

selectEl.addEventListener('change', ()=>{
  const idx = selectEl.value;
  if(idx==='') return;
  currentDoctor = data[currentPlatform][idx];
  nameEl.textContent = currentDoctor.name;
  linkEl.textContent = currentDoctor.url;
  qrImg.src = currentDoctor.qr;
  qrBlock.style.display='block';
  generateReview();
});

document.getElementById('openLinkBtn').addEventListener('click', ()=>{
  if(currentDoctor) window.open(currentDoctor.url,'_blank');
});

document.getElementById('copyLinkBtn').addEventListener('click', ()=>{
  if(currentDoctor){
    navigator.clipboard.writeText(currentDoctor.url);
    showToast("Ссылка скопирована");
  }
});

});
</script>
</body>
</html>
