// ------------------ ФУНКЦИИ ------------------
let currentPlatform = null;
let currentItem = null;

function generateReview(){
  const idx = Math.floor(Math.random() * reviews.length);
  document.getElementById('review').value = reviews[idx];
}

function copyReview(){
  const txt = document.getElementById('review');
  txt.select();
  txt.setSelectionRange(0,99999);
  navigator.clipboard.writeText(txt.value);
  showToast("Скопировано!");
}

function selectPlatform(p, el){
  currentPlatform = p;
  document.querySelectorAll('.platforms button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  const select = document.getElementById('select');
  select.innerHTML = '<option value="">Выберите филиал</option>';

  data[p].forEach((item,i)=>{
    const o = document.createElement('option');
    o.value = i;
    o.textContent = item.name;
    select.appendChild(o);
  });

  document.getElementById('qrBlock').classList.remove('show');
}

document.getElementById('select').onchange = function(){
  const idx = this.value;
  if(idx === "") return;
  currentItem = data[currentPlatform][idx];
  document.getElementById('name').textContent = currentItem.name;
  document.getElementById('qr').src = currentItem.qr;
  document.getElementById('link').textContent = currentItem.url;
  document.getElementById('qrBlock').classList.add('show');
};

function openLink(){
  if(currentItem) window.open(currentItem.url, "_blank");
}

function copyLink(){
  if(currentItem) {
    navigator.clipboard.writeText(currentItem.url);
    showToast("Ссылка скопирована!");
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>{t.style.display='none';},2000);
}
